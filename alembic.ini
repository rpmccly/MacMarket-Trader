[alembic]
script_location = alembic
# alembic/env.py overrides this from macmarket_trader.config.settings.database_url.
# Keep the fallback aligned with the Windows private-alpha SQLite runtime instead
# of pointing operators at an unreachable local Postgres default.
sqlalchemy.url = sqlite:///./macmarket_trader.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
